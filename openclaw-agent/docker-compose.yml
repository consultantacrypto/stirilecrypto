# OpenClaw agent — isolated editorial assistant
# Production tip: prefer a dedicated repo + private network; do not co-locate with the public Next.js app host.

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OPENCLAW_WORKSPACE: /home/clawuser/.openclaw/workspace
    ports:
      # Control UI/API — localhost only; never bind 0.0.0.0 in production
      - "127.0.0.1:18789:18789"
    volumes:
      - ./workspace:/home/clawuser/.openclaw/workspace
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777,uid=1001,gid=1001
